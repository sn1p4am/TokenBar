name: Attest release assets

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/attest-release-assets.yml"
      - "esbuild.config.mjs"
      - "manifest.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/**"
      - "src/**"
      - "styles.css"
      - "tsconfig.json"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build and attest. Leave empty to use the current branch."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  attest:
    name: Build and attest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Check release asset size
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const limit = 5 * 1024 * 1024;
          const size = fs.statSync("main.js").size;
          if (size >= limit) {
            throw new Error(`main.js is ${size} bytes, which is at or above the 5 MB Sync Standard limit.`);
          }
          for (const file of ["manifest.json", "styles.css"]) {
            fs.accessSync(file, fs.constants.R_OK);
          }
          NODE

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
