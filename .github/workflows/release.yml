name: Release plugin

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag to release, for example 0.1.3."
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Build, release, and attest
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: release_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_ref.outputs.name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Check release assets
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.name }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const tag = process.env.RELEASE_TAG;
          if (!/^\d+\.\d+\.\d+$/.test(tag)) {
            throw new Error(`Release tag must use x.y.z format. Received: ${tag}`);
          }
          if (manifest.version !== tag) {
            throw new Error(`manifest.json version ${manifest.version} does not match tag ${tag}.`);
          }

          const mainJsSize = fs.statSync("main.js").size;
          const limit = 5 * 1024 * 1024;
          if (mainJsSize >= limit) {
            throw new Error(`main.js is ${mainJsSize} bytes, which is at or above the 5 MB Sync Standard limit.`);
          }

          for (const file of ["main.js", "manifest.json", "styles.css"]) {
            fs.accessSync(file, fs.constants.R_OK);
          }
          NODE

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_ref.outputs.name }}
        run: |
          notes="Fix community review source warnings while keeping local tokenizer assets under the Sync Standard size limit."
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" main.js manifest.json styles.css --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" main.js manifest.json styles.css \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "$notes"
          fi

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
